syntax = "proto3";

package request;
option go_package = "github.com/dedyf5/resik/core/merchant/request";

message MerchantPost {
    string name = 1; // @gotags: json:"name" validate:"required,max=40" example:"Resik Merchant"
    // nullable
    optional string description = 2; // @gotags: json:"description" validate:"omitnil,notblank,max=5000" example:"Merchant description 1"
    string created_at = 3; // @gotags: json:"created_at" validate:"required,datetime=2006-01-02T15:04:05Z07:00" example:"2024-04-14T14:18:00Z"
}

message MerchantPut {
    uint64 id = 1; // @gotags: json:"-" param:"id" query:"-" validate:"required" example:"123"
    string name = 2; // @gotags: json:"name" validate:"required,max=40" example:"Resik Merchant"
    // nullable
    optional string description = 3; // @gotags: json:"description" validate:"omitnil,notblank,max=5000" example:"Merchant description 1"
    string updated_at = 4; // @gotags: json:"updated_at" validate:"required,datetime=2006-01-02T15:04:05Z07:00" example:"2024-04-14T14:18:00Z"
}
