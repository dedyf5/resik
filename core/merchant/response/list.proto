syntax = "proto3";

package response;
option go_package = "github.com/dedyf5/resik/core/merchant/response";

message MerchantList {
    uint64 id = 1; // @gotags: json:"id" example:"123"
    string name = 2; // @gotags: json:"name" example:"Resik Merchant"
    string created_at = 3; // @gotags: json:"created_at" example:"2024-01-14T11:40:00Z"
    string updated_at = 4; // @gotags: json:"updated_at" example:"2024-01-14T11:40:00Z"
}
