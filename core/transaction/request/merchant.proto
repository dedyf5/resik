syntax = "proto3";

package request;
option go_package = "github.com/dedyf5/resik/core/transaction/request";

message MerchantOmzetGet {
    uint64 merchant_id = 1; // @gotags: json:"-" param:"merchant_id" query:"-" validate:"required,min=1" example:"1"
    string mode = 2; // @gotags: json:"mode" query:"mode" validate:"required,oneof=day month year" example:"day"
    string datetime_start = 3; // @gotags: json:"datetime_start" query:"datetime_start" validate:"required,datetime=2006-01-02T15:04:05Z07:00" example:"2023-11-22T13:45:00Z"
    string datetime_end = 4; // @gotags: json:"datetime_end" query:"datetime_end" validate:"required,datetime=2006-01-02T15:04:05Z07:00" example:"2023-11-22T13:45:00Z"
    string timezone = 5; // @gotags: json:"timezone" query:"timezone" validate:"required,timezone" example:"Asia/Jakarta"
    string search = 6; // @gotags: json:"search" query:"search" validate:"" example:"keyword"
    optional string order = 7; // @gotags: json:"order" query:"order" validate:"omitempty,oneof_order=period omzet merchant_name" example:"period"
    optional int32 page = 8; // @gotags: json:"page" query:"page" validate:"omitempty,min=1" example:"1"
    optional int32 limit = 9; // @gotags: json:"limit" query:"limit" validate:"omitempty,min=1,max=100" example:"10"
}
